backend:
  name: git-gateway
  branch: main

# Lets you run the CMS locally against the filesystem with `npx decap-server`
# alongside `npm run dev`. Netlify Identity + Git Gateway handle auth in production.
local_backend: true

media_folder: "/public/uploads"
public_folder: "/uploads"

publish_mode: simple

collections:
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{fields.slug}}"
    summary: "{{order}} — {{title}}"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Slug",
          name: "slug",
          widget: "string",
          hint: "Used in the project URL, e.g. rigging-toolkit -> /projects/rigging-toolkit",
        }
      - {
          label: "Cover Image",
          name: "cover",
          widget: "image",
          media_folder: "/public/uploads",
          public_folder: "/uploads",
        }
      - {
          label: "Gallery",
          name: "gallery",
          widget: "list",
          field:
            {
              label: "Image",
              name: "image",
              widget: "image",
              media_folder: "/public/uploads",
              public_folder: "/uploads",
            },
          required: false,
          hint: "Extra images shown in the project's slideshow popup, in addition to the cover image",
        }
      - {
          label: "Video Link",
          name: "video",
          widget: "string",
          required: false,
          hint: "YouTube or Vimeo URL for the project breakdown video",
        }
      - {
          label: "3D Model (.glb / .gltf)",
          name: "model",
          widget: "file",
          required: false,
          media_folder: "/public/models",
          public_folder: "/models",
          hint: "Optional — an interactive 3D preview (rig, topology, prop) rendered with <model-viewer>",
        }
      - {
          label: "Click Effect",
          name: "clickEffect",
          widget: "select",
          options:
            ["none", "leaf", "smoke", "converge", "slash", "skull", "glass", "explosion", "bubble", "wind", "sparkle"],
          default: "none",
          required: false,
          hint: "A playful particle effect that plays when this card is clicked, before opening the project",
        }
      - {
          label: "Ambient Background Effect",
          name: "ambientEffect",
          widget: "select",
          options: ["none", "smoke", "embers", "dust", "snow", "fireflies", "fog"],
          default: "none",
          required: false,
          hint: "A subtle looping atmosphere effect that plays continuously while this project's full-screen view is open",
        }
      - {
          label: "Ambient Custom Video (optional)",
          name: "ambientVideoUrl",
          widget: "file",
          required: false,
          media_folder: "/public/ambient",
          public_folder: "/ambient",
          hint: "Upload your own looping video overlay instead of a preset — overrides Ambient Background Effect above",
        }
      - {
          label: "Tech Stack",
          name: "techStack",
          widget: "list",
          hint: "e.g. Python, Houdini, HLSL",
        }
      - {
          label: "Short Description",
          name: "description",
          widget: "text",
          hint: "Shown on the project card in the gallery",
        }
      - {
          label: "Order",
          name: "order",
          widget: "number",
          default: 0,
          hint: "Lower numbers appear first — use this to reorder the gallery",
        }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "history"
    label: "History"
    label_singular: "History Entry"
    folder: "src/content/history"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{fields.date}}-{{fields.title}}"
    summary: "{{date}} — {{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - {
          label: "Date",
          name: "date",
          widget: "string",
          hint: "YYYY or YYYY-MM, e.g. 2021-02 — controls the timeline order",
          pattern: ["^\\d{4}(-\\d{2})?$", "Use YYYY or YYYY-MM"],
        }
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Description",
          name: "description",
          widget: "text",
        }
      - {
          label: "Tag",
          name: "tag",
          widget: "select",
          options: ["origin", "education", "job", "release", "current"],
          required: false,
          hint: "Controls the timeline marker color",
        }

  - name: "settings"
    label: "Resume / Skills"
    files:
      - name: "resume"
        label: "Resume & Skills"
        file: "src/data/resume.json"
        fields:
          - { label: "Full Name", name: "name", widget: "string" }
          - { label: "Headline / Title", name: "title", widget: "string" }
          - {
              label: "Intro Animation Title",
              name: "introTitle",
              widget: "string",
              required: false,
              hint: "Shown briefly on the opening animation when a visitor first lands on the site. Leave blank to reuse Headline / Title above.",
            }
          - {
              label: "Intro Animation Style",
              name: "introStyle",
              widget: "select",
              options: [
                { label: "Elegant (slower, graceful)", value: "elegant" },
                { label: "Fast / Modern (quick, sharp, mechanical)", value: "fast" },
              ],
              default: "elegant",
              required: false,
            }
          - { label: "Tagline", name: "tagline", widget: "text" }
          - { label: "Contact Email", name: "email", widget: "string" }
          - { label: "GitHub URL", name: "githubUrl", widget: "string" }
          - { label: "ArtStation URL", name: "artstationUrl", widget: "string" }
          - { label: "YouTube URL", name: "youtubeUrl", widget: "string", required: false }
          - { label: "X (Twitter) URL", name: "xUrl", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagramUrl", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedinUrl", widget: "string", required: false }
          - {
              label: "CV / Resume PDF",
              name: "cvUrl",
              widget: "file",
              media_folder: "/public/cv",
              public_folder: "/cv",
            }
          - {
              label: "Reel Background Video",
              name: "reelVideoUrl",
              widget: "file",
              media_folder: "/public/videos",
              public_folder: "/videos",
            }
          - label: "Hero Slideshow"
            name: "heroSlides"
            widget: "list"
            summary: "{{fields.caption}}"
            hint: "Background slides for the homepage hero — fades between them on a timer. ⚠ If you add a new slide, finish filling it in (or delete it with the X) before clicking Publish — publishing with an empty/unfinished slide causes a CMS error."
            typeKey: "slideKind"
            types:
              - label: "Single Slide"
                name: "single"
                widget: "object"
                fields:
                  - {
                      label: "Media (image or video — detected automatically from the file)",
                      name: "src",
                      widget: "file",
                      media_folder: "/public/hero",
                      public_folder: "/hero",
                    }
                  - {
                      label: "Duration (seconds)",
                      name: "duration",
                      widget: "number",
                      default: 6,
                    }
                  - { label: "Caption", name: "caption", widget: "string", required: false }
              - label: "Comparison Group (2+ videos of the SAME shot)"
                name: "compare"
                widget: "object"
                hint: "⚠ Only combine videos that are the same animation/camera move — e.g. a solid-shading pass and a fully-textured pass of one render. Combining unrelated clips will look broken, since these modes assume every video lines up frame-for-frame."
                default:
                  mode: "fade"
                  sources:
                    - { src: "", label: "" }
                    - { src: "", label: "" }
                fields:
                  - label: "Combine Mode"
                    name: "mode"
                    widget: "select"
                    default: "fade"
                    options:
                      - { label: "Fade between them", value: "fade" }
                      - { label: "Split left/right", value: "split-horizontal" }
                      - { label: "Split up/down", value: "split-vertical" }
                  - label: "Videos to Combine (in order)"
                    name: "sources"
                    widget: "list"
                    summary: "{{fields.label}}"
                    min: 2
                    default:
                      - { src: "", label: "" }
                      - { src: "", label: "" }
                    fields:
                      - {
                          label: "Video",
                          name: "src",
                          widget: "file",
                          media_folder: "/public/hero",
                          public_folder: "/hero",
                        }
                      - { label: "Label (optional)", name: "label", widget: "string", required: false }
                  - {
                      label: "Duration per video (seconds, fade mode only)",
                      name: "duration",
                      widget: "number",
                      default: 4,
                    }
                  - { label: "Caption", name: "caption", widget: "string", required: false }
          - label: "Skills"
            name: "skills"
            widget: "list"
            summary: "{{category}}"
            fields:
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Items", name: "items", widget: "list" }
