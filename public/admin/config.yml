backend:
  name: git-gateway
  branch: main

# Lets you run the CMS locally against the filesystem with `npx decap-server`
# alongside `npm run dev`. Netlify Identity + Git Gateway handle auth in production.
local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: simple

collections:
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{fields.slug}}"
    summary: "{{order}} — {{title}}"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Slug",
          name: "slug",
          widget: "string",
          hint: "Used in the project URL, e.g. rigging-toolkit -> /projects/rigging-toolkit",
        }
      - { label: "Cover Image", name: "cover", widget: "image" }
      - {
          label: "Video Link",
          name: "video",
          widget: "string",
          required: false,
          hint: "YouTube or Vimeo URL for the project breakdown video",
        }
      - {
          label: "3D Model (.glb / .gltf)",
          name: "model",
          widget: "file",
          required: false,
          media_folder: "public/models",
          public_folder: "/models",
          hint: "Optional — an interactive 3D preview (rig, topology, prop) rendered with <model-viewer>",
        }
      - {
          label: "Click Effect",
          name: "clickEffect",
          widget: "select",
          options: ["none", "leaf", "smoke", "converge"],
          default: "none",
          required: false,
          hint: "A playful particle effect that plays when this card is clicked, before opening the project",
        }
      - {
          label: "Tech Stack",
          name: "techStack",
          widget: "list",
          hint: "e.g. Python, Houdini, HLSL",
        }
      - {
          label: "Short Description",
          name: "description",
          widget: "text",
          hint: "Shown on the project card in the gallery",
        }
      - {
          label: "Order",
          name: "order",
          widget: "number",
          default: 0,
          hint: "Lower numbers appear first — use this to reorder the gallery",
        }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "history"
    label: "History"
    label_singular: "History Entry"
    folder: "src/content/history"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{fields.date}}-{{fields.title}}"
    summary: "{{date}} — {{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - {
          label: "Date",
          name: "date",
          widget: "string",
          hint: "YYYY or YYYY-MM, e.g. 2021-02 — controls the timeline order",
          pattern: ["^\\d{4}(-\\d{2})?$", "Use YYYY or YYYY-MM"],
        }
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Description",
          name: "description",
          widget: "text",
        }
      - {
          label: "Tag",
          name: "tag",
          widget: "select",
          options: ["origin", "education", "job", "release", "current"],
          required: false,
          hint: "Controls the timeline marker color",
        }

  - name: "settings"
    label: "Resume / Skills"
    files:
      - name: "resume"
        label: "Resume & Skills"
        file: "src/data/resume.json"
        fields:
          - { label: "Full Name", name: "name", widget: "string" }
          - { label: "Headline / Title", name: "title", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "text" }
          - { label: "Contact Email", name: "email", widget: "string" }
          - { label: "GitHub URL", name: "githubUrl", widget: "string" }
          - { label: "ArtStation URL", name: "artstationUrl", widget: "string" }
          - {
              label: "CV / Resume PDF",
              name: "cvUrl",
              widget: "file",
              media_folder: "public/cv",
              public_folder: "/cv",
            }
          - {
              label: "Reel Background Video",
              name: "reelVideoUrl",
              widget: "file",
              media_folder: "public/videos",
              public_folder: "/videos",
            }
          - label: "Skills"
            name: "skills"
            widget: "list"
            summary: "{{category}}"
            fields:
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Items", name: "items", widget: "list" }
